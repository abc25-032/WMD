<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

 <meta name="viewport" content="width=device-width, initial-scale=1.0">

 <title>Document</title>


<style>

 label{

 display:inline-block;

width: 120px;

}

 </style>

</head>

<body>



<fieldset id="fldset">



<legend>Registration</legend>

<label for="customerid">Customer ID</label>

<input type="text" id="customerid" required

placeholder="Customer ID"/> <br>


 <label for="firstname">Firstname</label>

<input type="text" id="firstname" required

 placeholder="Firstname"/> <br>



 <label for="surname">Surname</label>

<input type="text" id="surname" required

 placeholder="Surname"/> <br>



 <label for="gender">Gender</label>

 <select id="gender"> onchange="alert(this.value)">

<!--<option>Select...</option>

            <option>Female</option>

            <option>Male</option>

        -->



<option value="0">select...</option>

<option value="F">Female</option>

<option value="M">Male</option>

</select><br>



 <label for="dob">DOB</label>

 <input type="date" id="dob"/> <br>



<label for="email">Email</label>

 <input type="email" id="email" required

 placeholder="Email Address"/> <br>

 <label>Marital status:</label>

 <label for="single">Single</label>

 <input type="radio" id="single" name="status" value="S"/>



<label for="married">Married</label>

 <input type="radio" id="married" name="status" value="M"/>


 <label for="widowed">Widowed</label>

<input type="radio" id="widowed" name="status" value="W"/>



 <label for="divorced">Divorced</label>

 <input type="radio" id="divorced" name="status" value="D"/> <br>



 <label for="cellno">Cell Number</label>

<input type="tel" id="cellno" required

placeholder="710000 000"/> <br>



 <label for="password">Password</label>

<input type="password" id="password" required/> <br>



<label for="dateregistered">Date Registered</label>

 <input type="date" id="dateregistered" required/> <br>



<label for="timeregistered">Time Registered</label>

 <input type="time" id="timeregistered" required/> <br>


<select id="country"> <br>

</select>



<label for="cms">CMS</label>

<input type="checkbox" id="cms" name="module"/>


<label for="wmd">WMD</label>

<input type="checkbox" id="wmd" name="module"/>


<label for="c#">C#</label>

 <input type="checkbox" id="C#" name="module"/>



</fieldset>



</body>

</html>
